[env:val_i2s_speaker]
extends = env:node_base
build_flags = -DCORE_DEBUG_LEVEL=0 -I shared
build_src_filter = +<../validation/i2s_speaker.cpp>

[env:val_cam_echo]
platform      = espressif32
board         = esp32cam
framework     = arduino
monitor_speed = 115200
upload_speed  = 460800
; ESP32-CAM MB: RTS holds chip in reset if not disabled
upload_port   = COM10
monitor_port  = COM10
monitor_rts   = 0
monitor_dtr   = 0
build_src_filter = +<../validation/cam_echo.cpp>

