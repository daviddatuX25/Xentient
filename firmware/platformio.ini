[env:node_base]
platform  = espressif32
board     = wemos_d1_uno32
framework = arduino

monitor_speed = 115200
upload_speed  = 115200
upload_port   = COM9
monitor_port  = COM9

lib_deps =
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0.0
    adafruit/Adafruit BME280 Library @ ^2.2.0
    adafruit/Adafruit Unified Sensor @ ^1.1.0
    links2004/WebSockets @ ^2.3.6

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -I shared

# Fallback: if wemos_d1_uno32 is not resolved by your PlatformIO version,
# replace the board line above with:
#   board = esp32doit-devkit-v1
#   board_build.mcu = esp32
# GPIO numbers are identical on both board definitions.

# --- Validation sketches (BB-I2S 1xi, BB-PIR 2ux) ---

[env:val_wire_scanner]
extends = env:node_base
build_flags = -DCORE_DEBUG_LEVEL=0 -I shared
build_src_filter = +<../validation/wire_scanner.cpp>

[env:val_i2s_read]
extends = env:node_base
build_flags = -DCORE_DEBUG_LEVEL=0 -I shared
build_src_filter = +<../validation/i2s_read.cpp>

[env:val_pir_interrupt]
